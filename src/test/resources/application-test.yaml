spring:
  datasource:
    url: jdbc:h2:mem:task-manager
    username: admin
    password: secret
    driverClassName: org.h2.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

jwt:
  token:
    expiration: 24h